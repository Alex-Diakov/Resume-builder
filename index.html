<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://vitejs.dev/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Diakov | Senior Product Designer Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              resume: {
                primary: '#1F1F1F', // Dark Grey (Not pure black)
                secondary: '#2D2D2D', // Body text
                accent: '#0056D2', // Link Blue
                muted: '#666666', // Metadata
                border: '#E5E5E5', // Thin dividers
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            screens: {
              print: { raw: 'print' },
            },
            fontSize: {
              'resume-name': ['24pt', { lineHeight: '1.1', letterSpacing: '-0.02em' }],
              'resume-title': ['14pt', { lineHeight: '1.2' }],
              'resume-section': ['10pt', { lineHeight: '1.2', letterSpacing: '0.04em' }],
              'resume-body': ['10pt', { lineHeight: '1.3' }],
              'resume-meta': ['9.5pt', { lineHeight: '1.3' }],
            }
          }
        }
      }
    </script>
    <!-- Preload fonts for better aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @page {
        margin: 0;
        size: A4;
      }
      body {
        margin: 0;
        padding: 0;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        font-family: 'Inter', sans-serif;
        background-color: #555; /* Dark background for web view */
      }
      
      /* Print utilities */
      @media print {
        body {
          background-color: white !important;
        }
        
        /* Hide scrollbars in print */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Reset margins for the pages to fit perfectly */
        .resume-sheet {
          margin: 0 !important;
          width: 210mm !important;
          min-height: 297mm !important;
          box-shadow: none !important;
        }
      }

      /* PDF Generation Utilities */
      .break-before-page {
        page-break-before: always !important;
        break-before: page !important;
        display: block;
      }
      
      .break-after-avoid {
        page-break-after: avoid !important;
        break-after: avoid !important;
      }
      
      .break-inside-avoid {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-800 text-resume-secondary">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
